name: setup-ci
description: Install Bun and Zig, restore caches, install dependencies, and optionally install Playwright.

inputs:
  bun-version:
    required: false
    default: "1.3.11"
  zig-version:
    required: false
    default: "0.15.2"
  cache-key-suffix:
    required: true
  install-playwright:
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - uses: actions/cache@v5
      with:
        path: |
          ~/.bun/install/cache
          ~/.cache/zig
          .zig-cache
          zig-out
          .tooling/zlint/zig-out
          .tooling/zlint/.zig-cache
          third_party/zmx/.zig-cache
          third_party/zmx/zig-out
          node_modules
          web/node_modules
          third_party/libghostty/node_modules
        key: ${{ runner.os }}-bun-zig-${{ inputs.cache-key-suffix }}
        restore-keys: |
          ${{ runner.os }}-bun-zig-

    - uses: actions/cache@v5
      if: ${{ inputs.install-playwright == 'true' }}
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ inputs.cache-key-suffix }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install Zig
      shell: bash
      env:
        ZIG_VERSION: ${{ inputs.zig-version }}
      run: |
        set -euo pipefail

        case "${RUNNER_OS}" in
          Linux) zig_os="linux" ;;
          macOS) zig_os="macos" ;;
          *)
            echo "Unsupported runner OS: ${RUNNER_OS}" >&2
            exit 1
            ;;
        esac

        case "$(uname -m)" in
          x86_64|amd64) zig_arch="x86_64" ;;
          arm64|aarch64) zig_arch="aarch64" ;;
          *)
            echo "Unsupported runner architecture: $(uname -m)" >&2
            exit 1
            ;;
        esac

        zig_tool_dir="${HOME}/.cache/zig/toolchains"
        zig_install_dir="${zig_tool_dir}/${zig_arch}-${zig_os}-${ZIG_VERSION}"

        if [ ! -x "${zig_install_dir}/zig" ]; then
          mkdir -p "${zig_tool_dir}"
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "${tmpdir}"' EXIT

          export ZIG_OS="${zig_os}"
          export ZIG_ARCH="${zig_arch}"
          zig_metadata="$(
            curl -fsSL https://ziglang.org/download/index.json | \
              bun --eval '
                const index = JSON.parse(await Bun.stdin.text());
                const version = process.env.ZIG_VERSION;
                const target = `${process.env.ZIG_ARCH}-${process.env.ZIG_OS}`;
                const release = index[version];
                if (!release) {
                  console.error(`Unknown Zig version: ${version}`);
                  process.exit(1);
                }
                const artifact = release[target];
                if (!artifact?.tarball || !artifact?.shasum) {
                  console.error(`No Zig artifact for ${target} at ${version}`);
                  process.exit(1);
                }
                console.log(artifact.tarball);
                console.log(artifact.shasum);
              '
          )"

          zig_url="$(printf '%s\n' "${zig_metadata}" | sed -n '1p')"
          zig_shasum="$(printf '%s\n' "${zig_metadata}" | sed -n '2p')"
          if [ -z "${zig_url}" ] || [ -z "${zig_shasum}" ]; then
            echo "Failed to resolve Zig download metadata" >&2
            exit 1
          fi
          archive_path="${tmpdir}/${zig_url##*/}"

          curl -fsSL "${zig_url}" -o "${archive_path}"
          printf '%s  %s\n' "${zig_shasum}" "${archive_path}" | shasum -a 256 -c -
          tar -xf "${archive_path}" -C "${tmpdir}"

          extracted_dir="$(find "${tmpdir}" -mindepth 1 -maxdepth 1 -type d | head -n1)"
          if [ -z "${extracted_dir}" ]; then
            echo "Failed to locate extracted Zig directory" >&2
            exit 1
          fi

          rm -rf "${zig_install_dir}"
          mv "${extracted_dir}" "${zig_install_dir}"
        fi

        echo "${zig_install_dir}" >> "$GITHUB_PATH"

    - name: Install root dependencies
      shell: bash
      run: bun install --frozen-lockfile

    - name: Install web package dependencies
      shell: bash
      run: |
        cd web
        bun install --frozen-lockfile

    - name: Install libghostty wrapper dependencies
      shell: bash
      run: |
        cd third_party/libghostty
        bun install --frozen-lockfile || bun install

    - name: Install zlint
      shell: bash
      run: |
        set -euo pipefail
        if [ ! -x ".tooling/zlint/zig-out/bin/zlint" ]; then
          rm -rf .tooling/zlint
          git clone --depth=1 https://github.com/DonIsaac/zlint.git .tooling/zlint
          (
            cd .tooling/zlint
            zig build --release=safe
          )
        fi
        echo "ZLINT_BIN=${GITHUB_WORKSPACE}/.tooling/zlint/zig-out/bin/zlint" >> "$GITHUB_ENV"

    - name: Install Playwright Chromium
      if: ${{ inputs.install-playwright == 'true' }}
      shell: bash
      run: |
        if [ "${RUNNER_OS}" = "Linux" ]; then
          bunx playwright install --with-deps chromium
        else
          bunx playwright install chromium
        fi

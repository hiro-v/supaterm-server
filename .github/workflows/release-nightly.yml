name: release-nightly

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: tag nightly release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.prepare.outputs.version }}
      tag: ${{ steps.prepare.outputs.tag }}
      release_day: ${{ steps.prepare.outputs.release_day }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          submodules: false

      - name: Compute nightly tag and create it
        id: prepare
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_DAY="$(date -u +%F)"
          VERSION="nightly-${RELEASE_DAY}"
          TAG="nightly-${RELEASE_DAY}"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Nightly tag ${TAG} already exists" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Nightly ${RELEASE_DAY}" "${GITHUB_SHA}"
          git push origin "${TAG}"
          echo "release_day=${RELEASE_DAY}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  build:
    name: nightly build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    needs:
      - prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          submodules: recursive

      - name: Compute cache key inputs
        id: cache_key
        shell: bash
        run: |
          echo "libghostty=$(git rev-parse HEAD:third_party/libghostty/ghostty)" >> "$GITHUB_OUTPUT"
          echo "zmx=$(git rev-parse HEAD:third_party/zmx)" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/setup-ci
        with:
          cache-key-suffix: ${{ hashFiles('bun.lock', 'package.json', 'web/package.json', '.gitmodules', 'zlint.json', 'patches/libghosty/libghosty.patch', 'patches/zmx/zmx.patch') }}-${{ steps.cache_key.outputs.libghostty }}-${{ steps.cache_key.outputs.zmx }}

      - name: Build embedded release binary
        shell: bash
        run: |
          zig build --release=small -Dembed-assets=true -Dapp-version="${{ needs.prepare.outputs.version }}"

      - name: Package release artifacts
        shell: bash
        run: |
          sh ./scripts/package-release.sh "${{ needs.prepare.outputs.version }}"

      - uses: actions/upload-artifact@v7
        with:
          name: nightly-${{ matrix.platform }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  release:
    name: publish nightly prerelease
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - prepare
      - build
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish nightly prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${{ needs.prepare.outputs.tag }}" \
            --verify-tag \
            --prerelease \
            --title "Supaterm Nightly ${{ needs.prepare.outputs.release_day }}" \
            --generate-notes \
            dist/* \
            -R "${GITHUB_REPOSITORY}"

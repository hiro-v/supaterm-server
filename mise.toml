[tools]
zig = "0.15.2"
bun = "1.3.11"

[env]
_.file = ".env"

[tasks.setup]
run = "git submodule update --init --recursive && bun install && bun run hooks:install"

[tasks.dev]
run = "sh ./scripts/zigw.sh build run"

[tasks.release]
run = "sh ./scripts/zigw.sh build --release=small -Dembed-assets=true"

[tasks.check]
run = "sh ./scripts/zigw.sh build check && bun run web:typecheck && bun run test:unit"
